services:
  go-api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 1m30s
      timeout: 30s
      retries: 3

  python-algo:
    build: ./ranker
    ports: "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 1m30s
      timeout: 30s
      retries: 3

  postgres:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agora"]
      interval: 15s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
  uploads:
